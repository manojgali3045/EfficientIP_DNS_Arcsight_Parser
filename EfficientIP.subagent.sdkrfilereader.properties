# FlexAgent Regex Configuration File
# Device: EfficientIP DNS (BIND named)
do.unparsed.events=true
regex=(named)\\[(\\d+)\\]\\:\\s+(.*)
token.count=3
token[0].name=Message
token[0].type=String
token[1].name=msg
token[1].type=Long
token[2].name=submsg
token[2].type=String
submessage.messageid.token=Message
submessage.token=submsg
event.deviceCustomNumber1=msg
event.deviceVendor=__stringConstant("Efficient IP")
event.deviceProduct=__stringConstant("DNS Logs")
event.deviceCustomNumber1Label=__stringConstant("named PID")
event.name=__stringConstant("DNS Logs")
event.deviceProcessName=__stringConstant("named")
submessage.count=1
submessage[0].messageid=named
submessage[0].pattern.count=13
# =====================================================================
# PATTERN[0]: DNS Answer WITH data (NOERROR + TTL + resolved IPs)
# =====================================================================
submessage[0].pattern[0].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+(answer)\\:\\s+(\\S+)\\s+IN\\s+(\\S+)\\s+(\\S+)\\s+\\((\\d+\\.\\d+\\.\\d+\\.\\d+)\\)\\s+\\->\\s+(\\S+)\\s+\\S+\\s+(\\d+)\\s+(.+)
submessage[0].pattern[0].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.requestUrl,event.deviceCustomString2,event.deviceCustomString3,event.destinationAddress,event.deviceCustomString6,event.deviceCustomNumber2,event.message
submessage[0].pattern[0].extramappings=event.deviceEventClassId\=__stringConstant("dns-answer")
# =====================================================================
# PATTERN[1]: DNS Answer WITHOUT data (NXDOMAIN / SERVFAIL / empty NOERROR)
# =====================================================================
submessage[0].pattern[1].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+(answer)\\:\\s+(\\S+)\\s+IN\\s+(\\S+)\\s+(\\S+)\\s+\\((\\d+\\.\\d+\\.\\d+\\.\\d+)\\)\\s+\\->\\s+(\\S+)\\s*$
submessage[0].pattern[1].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.requestUrl,event.deviceCustomString2,event.deviceCustomString3,event.destinationAddress,event.deviceCustomString6
submessage[0].pattern[1].extramappings=event.deviceEventClassId\=__stringConstant("dns-answer-nodata")
# =====================================================================
# PATTERN[2]: DNS Query Standard
# =====================================================================
submessage[0].pattern[2].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+(query)\\:\\s+(\\S+)\\s+IN\\s+(\\S+)\\s+(\\S+)\\s+\\((\\d+\\.\\d+\\.\\d+\\.\\d+)\\)\\s*$
submessage[0].pattern[2].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.requestUrl,event.deviceCustomString2,event.deviceCustomString3,event.destinationAddress
submessage[0].pattern[2].extramappings=event.deviceEventClassId\=__stringConstant("dns-query")
# =====================================================================
# PATTERN[3]: DNS Query with ECS
# =====================================================================
submessage[0].pattern[3].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+(query)\\:\\s+(\\S+)\\s+IN\\s+(\\S+)\\s+(\\S+)\\s+\\((\\d+\\.\\d+\\.\\d+\\.\\d+)\\)\\s+\\[ECS\\s+([^\\]]+)\\]
submessage[0].pattern[3].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.requestUrl,event.deviceCustomString2,event.deviceCustomString3,event.destinationAddress,event.deviceCustomString4
submessage[0].pattern[3].extramappings=event.deviceEventClassId\=__stringConstant("dns-query-ecs")
# =====================================================================
# PATTERN[4]: RPZ Rewrite (DNS Firewall - SECURITY CRITICAL)
# =====================================================================
submessage[0].pattern[4].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+rpz\\s+\\S+\\s+(\\S+)\\s+\\S+\\s+([^/]+)/\\S+\\s+via\\s+(\\S+)
submessage[0].pattern[4].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.requestUrl,event.deviceCustomString4
submessage[0].pattern[4].extramappings=event.deviceEventClassId\=__stringConstant("dns-rpz-block")
# =====================================================================
# PATTERN[5]: Query Failed
# =====================================================================
submessage[0].pattern[5].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+\\(([^)]+)\\)\\:\\s+(query failed)\\s+\\((\\S+)\\)\\s+for\\s+([^/]+)/(.*)
submessage[0].pattern[5].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.destinationNtDomain,event.deviceAction,event.deviceCustomString2,event.requestUrl,event.message
submessage[0].pattern[5].extramappings=event.deviceEventClassId\=__stringConstant("dns-query-failed")
# =====================================================================
# PATTERN[6]: FORMERR / SERVFAIL / REFUSED
# =====================================================================
submessage[0].pattern[6].regex=(FORMERR|SERVFAIL|REFUSED)\\s+(.*resolving\\s+'([^/]+)/(\\S+)'\\:\\s+(\\S+)\\#\\d+)
submessage[0].pattern[6].fields=event.deviceAction,event.message,event.destinationNtDomain,event.deviceCustomString2,event.deviceCustomString5
submessage[0].pattern[6].extramappings=event.deviceEventClassId\=__stringConstant("dns-rcode-error")
# =====================================================================
# PATTERN[7]: DNS Format Error WITH original client IP
# =====================================================================
submessage[0].pattern[7].regex=(DNS format error)\\s+from\\s+(\\S+)\\#\\d+\\s+resolving\\s+(\\S+)\\s+for\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\:\\s+(.*)
submessage[0].pattern[7].fields=event.deviceAction,event.deviceCustomString5,event.requestUrl,event.sourceAddress,event.sourcePort,event.message
submessage[0].pattern[7].extramappings=event.deviceEventClassId\=__stringConstant("dns-format-error")
# =====================================================================
# PATTERN[8]: DNS Format Error WITHOUT client IP (fallback)
# =====================================================================
submessage[0].pattern[8].regex=(DNS format error)\\s+from\\s+(\\S+)\\#\\d+\\s+resolving\\s+(\\S+)(.*)
submessage[0].pattern[8].fields=event.deviceAction,event.deviceCustomString5,event.requestUrl,event.message
submessage[0].pattern[8].extramappings=event.deviceEventClassId\=__stringConstant("dns-format-error")
# =====================================================================
# PATTERN[9]: DNSSEC Validating
# =====================================================================
submessage[0].pattern[9].regex=\\s*(validating)\\s+(\\S+)/(\\S+)\\:\\s+(.*)
submessage[0].pattern[9].fields=event.deviceAction,event.destinationNtDomain,event.deviceCustomString2,event.message
submessage[0].pattern[9].extramappings=event.deviceEventClassId\=__stringConstant("dns-dnssec-fail")
# =====================================================================
# PATTERN[10]: Loop Detected
# =====================================================================
submessage[0].pattern[10].regex=(loop detected)\\s+resolving\\s+'([^/]+)/(\\S+)'
submessage[0].pattern[10].fields=event.deviceAction,event.destinationNtDomain,event.deviceCustomString2
submessage[0].pattern[10].extramappings=event.deviceEventClassId\=__stringConstant("dns-loop")
# =====================================================================
# PATTERN[11]: Generic Client catch-all
# =====================================================================
submessage[0].pattern[11].regex=\\w+\\s+\\@(\\S+)\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)\\#(\\d+)\\s+(.*)
submessage[0].pattern[11].fields=event.deviceCustomString1,event.sourceAddress,event.sourcePort,event.message
submessage[0].pattern[11].extramappings=event.deviceEventClassId\=__stringConstant("dns-client")
# =====================================================================
# PATTERN[12]: Catch-all
# =====================================================================
submessage[0].pattern[12].regex=(.+)
submessage[0].pattern[12].fields=event.message
